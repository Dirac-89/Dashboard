     // 요일별 링크 열기
function openEnglishToday() {
    const day = new Date().getDay(); // 0:일, 1:월, 2:화, 3:수, 4:목, 5:금, 6:토
    
    // 기본 매일 코스 (항상 열림)
    const dailyLinks = [
        "https://www.bbc.co.uk/learningenglish/english/course/eiam/unit-3"
    ];
    
    // 요일별 추가 코스
     switch (day) {
         case 1: //월요일
            dailyLinks.push("https://www.bbc.co.uk/learningenglish/features/the-english-we-speak");         
            break;
         case 2: //화요일
            dailyLinks.push("https://www.bbc.co.uk/learningenglish/english/features/learning-english-grammar");         
            break;
         case 3: //수요일
            dailyLinks.push("https://www.bbc.co.uk/learningenglish/english/features/office-english");         
            break;
         case 4: //목요일
            dailyLinks.push("https://www.bbc.co.uk/learningenglish/english/features/6-minute-english");         
            break;
         case 5: //금요일
            dailyLinks.push("https://www.bbc.co.uk/learningenglish/english/features/real-easy-english");         
            break;
         default:
            break;
     }
    // 모든 해당 링크를 새 탭으로 오픈
    dailyLinks.forEach(url => window.open(url, '_blank'));
}

 function openKanjiToday() {
    // 1. 기준 날짜 설정 (2026년 3월 22일)
    const startDate = new Date("2026-03-22");
    // 2. 오늘 날짜 설정 (시간을 00:00:00으로 맞춰서 일수 계산을 정확하게 함)
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    startDate.setHours(0, 0, 0, 0);

    // 3. 기준일로부터 며칠이 지났는지 계산
    const diffTime = today.getTime() - startDate.getTime();
    const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

    // 4. 시작 번호 1173에 (경과 일수 * 5)를 더함
    // 만약 오늘이 22일 이전이면 1073이 열리고, 이후면 5씩 증가함
    const baseNumber = 1173;
    const currentNumber = baseNumber + (diffDays > 0 ? diffDays * 5 : 0);

    // 5. 최종 링크 생성 및 오픈
    const finalUrl = `https://nihongokanji.com/${currentNumber}`;
    window.open(finalUrl, '_blank');
}
